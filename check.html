<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>담임 관리 앱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root {
    --bg: #f0f2f5; --card: #ffffff; --primary: #2d6a4f; --primary-light: #40916c;
    --primary-pale: #d8f3dc; --accent: #f77f00; --accent-pale: #fff0d9;
    --danger: #e63946; --danger-pale: #fde8ea; --warning: #f4a261; --warning-pale: #fff4e9;
    --text: #1a1a2e; --text-muted: #6c757d; --border: #e0e0e0;
    --shadow: 0 2px 12px rgba(0,0,0,0.08); --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app-header { background: var(--primary); color: white; padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .app-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .app-header .subtitle { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .tab-bar { display: flex; background: white; border-bottom: 2px solid var(--border); position: sticky; top: 62px; z-index: 99; overflow-x: auto; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn { flex: 1; min-width: 70px; padding: 10px 6px; border: none; background: transparent; font-family: inherit; font-size: 11px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
  .tab-btn .tab-icon { display: block; font-size: 16px; margin-bottom: 2px; }
  .tab-panel { display: none; padding: 16px; }
  .tab-panel.active { display: block; }
  .date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; background: white; border-radius: var(--radius); padding: 12px 16px; box-shadow: var(--shadow); }
  .date-row label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .date-row input[type="date"] { border: none; font-family: inherit; font-size: 14px; font-weight: 700; color: var(--primary); cursor: pointer; outline: none; background: transparent; }
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .summary-card { background: white; border-radius: 12px; padding: 12px 8px; text-align: center; box-shadow: var(--shadow); }
  .summary-card .s-num { font-size: 22px; font-weight: 700; }
  .summary-card .s-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .summary-card.total .s-num { color: var(--primary); }
  .summary-card.absent .s-num { color: var(--danger); }
  .summary-card.late .s-num { color: var(--warning); }
  .summary-card.early .s-num { color: var(--accent); }
  .student-card { background: white; border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .student-num { width: 28px; height: 28px; border-radius: 50%; background: var(--primary-pale); color: var(--primary); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .student-name { font-size: 15px; font-weight: 500; flex: 1; }
  .status-chips { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .chip { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; border: 2px solid transparent; cursor: pointer; transition: all 0.15s; user-select: none; }
  .chip.absent { background: var(--danger-pale); color: var(--danger); }
  .chip.late { background: var(--warning-pale); color: #d4730a; }
  .chip.early { background: var(--accent-pale); color: var(--accent); }
  .chip.active.absent { background: var(--danger); color: white; border-color: var(--danger); }
  .chip.active.late { background: var(--warning); color: white; border-color: var(--warning); }
  .chip.active.early { background: var(--accent); color: white; border-color: var(--accent); }
  .memo-input { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 10px; font-family: inherit; font-size: 12px; color: var(--text); margin-top: 6px; resize: none; outline: none; transition: border-color 0.2s; min-height: 36px; }
  .memo-input:focus { border-color: var(--primary); }
  .doc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; width: 100%; }
  .doc-check { display: flex; align-items: center; gap: 8px; background: var(--bg); border-radius: 8px; padding: 8px 10px; cursor: pointer; transition: background 0.15s; font-size: 12px; font-weight: 500; user-select: none; }
  .doc-check input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0; }
  .doc-check.checked { background: var(--primary-pale); color: var(--primary); }
  .notice-card { background: white; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .notice-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .notice-title-input { flex: 1; border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 12px; font-family: inherit; font-size: 14px; font-weight: 500; outline: none; transition: border-color 0.2s; }
  .notice-title-input:focus { border-color: var(--primary); }
  .btn-remove { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--danger-pale); color: var(--danger); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .notice-student-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .notice-student-row:last-child { border-bottom: none; }
  .notice-name { font-weight: 500; }
  .toggle-collect { padding: 4px 12px; border-radius: 20px; border: 2px solid var(--border); background: white; font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
  .toggle-collect.done { background: var(--primary); border-color: var(--primary); color: white; }
  .notice-progress { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .progress-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; }
  .progress-text { font-size: 11px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
  .btn-primary { display: block; width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: var(--radius); font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 12px; transition: background 0.2s; }
  .btn-primary:active { background: var(--primary-light); }
  .btn-secondary { display: block; width: 100%; padding: 14px; background: white; color: var(--primary); border: 2px solid var(--primary); border-radius: var(--radius); font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .setting-card { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
  .setting-label { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; display: block; }
  .student-edit-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  .student-edit-row input { flex: 1; border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 10px; font-family: inherit; font-size: 13px; outline: none; }
  .student-edit-row input:focus { border-color: var(--primary); }
  .btn-icon { width: 30px; height: 30px; border-radius: 8px; border: none; background: var(--danger-pale); color: var(--danger); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-add-student { width: 100%; padding: 8px; border: 2px dashed var(--border); border-radius: 8px; background: transparent; font-family: inherit; font-size: 13px; color: var(--text-muted); cursor: pointer; margin-top: 4px; }
  .export-section { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-top: 12px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }
  .expand-btn { width: 100%; background: none; border: none; text-align: left; font-family: inherit; font-size: 12px; color: var(--primary); cursor: pointer; padding: 6px 0 0; font-weight: 600; }
  .expand-content { display: none; }
  .expand-content.open { display: block; }
  .doc-date-card { background: white; border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .doc-date-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .doc-date-label { font-size: 14px; font-weight: 700; color: var(--primary); }
  .doc-date-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .doc-student-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .doc-student-row:last-child { border-bottom: none; }
  .doc-student-info { flex: 1; }
  .doc-student-name { font-size: 13px; font-weight: 600; }
  .doc-student-type { font-size: 11px; margin-top: 2px; }
  .type-absent { color: var(--danger); }
  .type-late { color: #d4730a; }
  .type-early { color: var(--accent); }
  .doc-checks { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .doc-check-row { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 8px; background: var(--bg); transition: background 0.15s; }
  .doc-check-row input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--primary); cursor: pointer; }
  .doc-check-row.checked { background: var(--primary-pale); color: var(--primary); }
  .doc-pending-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; background: var(--danger-pale); color: var(--danger); }
  .doc-ok-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; background: var(--primary-pale); color: var(--primary); }
</style>
</head>
<body>
<div class="app-header">
  <h1>📋 담임 관리 앱</h1>
  <div class="subtitle" id="headerDate"></div>
</div>
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('attendance',this)"><span class="tab-icon">🏫</span>출결</button>
  <button class="tab-btn" onclick="switchTab('docs',this)"><span class="tab-icon">📄</span>신고서</button>
  <button class="tab-btn" onclick="switchTab('notice',this)"><span class="tab-icon">📨</span>가정통신</button>
  <button class="tab-btn" onclick="switchTab('memo',this)"><span class="tab-icon">📝</span>메모</button>
  <button class="tab-btn" onclick="switchTab('settings',this)"><span class="tab-icon">⚙️</span>설정</button>
</div>

<div id="tab-attendance" class="tab-panel active">
  <div class="date-row">
    <label>날짜</label>
    <input type="date" id="attendanceDate" onchange="renderAttendance()">
  </div>
  <div class="summary-grid">
    <div class="summary-card total"><div class="s-num" id="sumTotal">0</div><div class="s-label">전체</div></div>
    <div class="summary-card absent"><div class="s-num" id="sumAbsent">0</div><div class="s-label">결석</div></div>
    <div class="summary-card late"><div class="s-num" id="sumLate">0</div><div class="s-label">지각</div></div>
    <div class="summary-card early"><div class="s-num" id="sumEarly">0</div><div class="s-label">조퇴</div></div>
  </div>
  <div id="attendanceList"></div>
</div>

<div id="tab-docs" class="tab-panel">
  <div id="docsList"></div>
</div>

<div id="tab-notice" class="tab-panel">
  <div id="noticeList"></div>
  <button class="btn-primary" onclick="addNotice()">＋ 가정통신문 추가</button>
</div>

<div id="tab-memo" class="tab-panel">
  <div id="memoList"></div>
</div>

<div id="tab-settings" class="tab-panel">
  <div class="setting-card">
    <span class="setting-label">🏫 학급 정보</span>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <input id="classInfo" type="text" placeholder="예: 2학년 3반" style="flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:14px;outline:none;">
      <button onclick="saveClassInfo()" style="padding:8px 14px;background:var(--primary);color:white;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;">저장</button>
    </div>
  </div>
  <div class="setting-card">
    <span class="setting-label">👥 학생 명단</span>
    <div id="studentEditList"></div>
    <button class="btn-add-student" onclick="addStudentField()">＋ 학생 추가</button>
    <button class="btn-primary" onclick="saveStudents()">명단 저장</button>
  </div>
  <div class="export-section">
    <span class="setting-label">📊 데이터 내보내기</span>
    <button class="btn-secondary" onclick="exportExcel()">📥 엑셀로 내보내기 (CSV)</button>
    <p style="font-size:11px;color:var(--text-muted);margin-top:8px;line-height:1.5;">CSV 파일은 엑셀/Numbers에서 바로 열 수 있어요.</p>
  </div>
</div>

<script>
let appData = {
  classInfo: '',
  students: ['김민준','이서연','박지호','최수빈','정유나','강도현','윤하은','임재원','한소희','오승민','신예린','류준혁','장미래','고태양','백지수','문성현','송다인','양재현','조은별','황민호','노지원','서현우'],
  attendance: {}, docs: {}, notices: [], memos: {}
};

function loadData() {
  const saved = localStorage.getItem('damimApp_v2');
  if (saved) { try { appData = Object.assign(appData, JSON.parse(saved)); } catch(e) {} }
  document.getElementById('classInfo').value = appData.classInfo || '';
  renderStudentEditList();
}
function saveData() { localStorage.setItem('damimApp_v2', JSON.stringify(appData)); }
function todayStr() { return new Date().toISOString().slice(0,10); }

function updateHeader() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})${appData.classInfo ? ' · ' + appData.classInfo : ''}`;
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name==='attendance') renderAttendance();
  if (name==='docs') renderDocs();
  if (name==='notice') renderNotices();
  if (name==='memo') renderMemos();
  if (name==='settings') renderStudentEditList();
}

function renderAttendance() {
  const dateInput = document.getElementById('attendanceDate');
  const date = dateInput.value || todayStr();
  if (!dateInput.value) dateInput.value = date;
  if (!appData.attendance[date]) appData.attendance[date] = {};
  const dayData = appData.attendance[date];
  let absent=0, late=0, early=0;
  const list = document.getElementById('attendanceList');
  list.innerHTML = '';
  appData.students.forEach((name, idx) => {
    const num = String(idx+1);
    if (!dayData[num]) dayData[num] = {absent:false,late:false,early:false};
    const s = dayData[num];
    if (s.absent) absent++; if (s.late) late++; if (s.early) early++;
    const card = document.createElement('div');
    card.className = 'student-card';
    card.innerHTML = `
      <div class="student-num">${num}</div>
      <div class="student-name">${name}</div>
      <div class="status-chips">
        <button class="chip absent ${s.absent?'active':''}" onclick="toggleAttend('${date}','${num}','absent',this)">결석</button>
        <button class="chip late ${s.late?'active':''}" onclick="toggleAttend('${date}','${num}','late',this)">지각</button>
        <button class="chip early ${s.early?'active':''}" onclick="toggleAttend('${date}','${num}','early',this)">조퇴</button>
      </div>`;
    list.appendChild(card);
  });
  document.getElementById('sumTotal').textContent = appData.students.length;
  document.getElementById('sumAbsent').textContent = absent;
  document.getElementById('sumLate').textContent = late;
  document.getElementById('sumEarly').textContent = early;
}

function toggleAttend(date, num, type, btn) {
  const s = appData.attendance[date][num];
  s[type] = !s[type];
  btn.classList.toggle('active', s[type]);
  saveData();
  let absent=0,late=0,early=0;
  Object.values(appData.attendance[date]).forEach(v => { if(v.absent)absent++; if(v.late)late++; if(v.early)early++; });
  document.getElementById('sumAbsent').textContent=absent;
  document.getElementById('sumLate').textContent=late;
  document.getElementById('sumEarly').textContent=early;
}

function renderDocs() {
  const list = document.getElementById('docsList');
  list.innerHTML = '';
  const sortedDates = Object.keys(appData.attendance).sort().reverse();
  const byDate = {};
  sortedDates.forEach(date => {
    const dayData = appData.attendance[date];
    appData.students.forEach((name, idx) => {
      const num = String(idx+1);
      const s = dayData[num] || {};
      const types = [];
      if (s.absent) types.push('absent');
      if (s.late)   types.push('late');
      if (s.early)  types.push('early');
      if (types.length > 0) {
        if (!byDate[date]) byDate[date] = [];
        byDate[date].push({num, name, types});
      }
    });
  });
  if (Object.keys(byDate).length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>출결 탭에서 결석/지각/조퇴를<br>먼저 체크해주세요</p></div>`;
    return;
  }
  Object.keys(byDate).sort().reverse().forEach(date => {
    const entries = byDate[date];
    const d = new Date(date);
    const days = ['일','월','화','수','목','금','토'];
    const dateLabel = `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
    let pending = 0;
    entries.forEach(e => {
      const key = `${date}_${e.num}`;
      const ds = appData.docs[key] || {};
      if (!ds.report || !ds.proof) pending++;
    });
    const rows = entries.map(e => {
      const key = `${date}_${e.num}`;
      if (!appData.docs[key]) appData.docs[key] = {report:false, proof:false};
      const ds = appData.docs[key];
      const typeLabels = e.types.map(t => {
        if (t==='absent') return `<span class="type-absent">결석</span>`;
        if (t==='late')   return `<span class="type-late">지각</span>`;
        if (t==='early')  return `<span class="type-early">조퇴</span>`;
      }).join(' ');
      return `<div class="doc-student-row">
        <div class="student-num" style="margin-top:2px">${e.num}</div>
        <div class="doc-student-info">
          <div class="doc-student-name">${e.name}</div>
          <div class="doc-student-type">${typeLabels}</div>
        </div>
        <div class="doc-checks">
          <label class="doc-check-row ${ds.report?'checked':''}">
            <input type="checkbox" ${ds.report?'checked':''} onchange="toggleDoc('${key}','report',this)">출결신고서
          </label>
          <label class="doc-check-row ${ds.proof?'checked':''}">
            <input type="checkbox" ${ds.proof?'checked':''} onchange="toggleDoc('${key}','proof',this)">증빙서류
          </label>
        </div>
      </div>`;
    }).join('');
    const card = document.createElement('div');
    card.className = 'doc-date-card';
    card.innerHTML = `
      <div class="doc-date-header">
        <div>
          <div class="doc-date-label">📅 ${dateLabel}</div>
          <div class="doc-date-sub">${entries.length}명 해당</div>
        </div>
        ${pending > 0 ? `<span class="doc-pending-badge">미제출 ${pending}명</span>` : `<span class="doc-ok-badge">✓ 모두 제출</span>`}
      </div>
      ${rows}`;
    list.appendChild(card);
  });
}

function toggleDoc(key, type, input) {
  if (!appData.docs[key]) appData.docs[key] = {report:false, proof:false};
  appData.docs[key][type] = input.checked;
  input.closest('.doc-check-row').classList.toggle('checked', input.checked);
  saveData();
  renderDocs();
}

function renderNotices() {
  const list = document.getElementById('noticeList');
  list.innerHTML = '';
  if (appData.notices.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>가정통신문을 추가해보세요</p></div>`;
    return;
  }
  appData.notices.forEach((notice, nIdx) => {
    const total = appData.students.length;
    const collected = Object.values(notice.collected||{}).filter(Boolean).length;
    const pct = total>0 ? Math.round(collected/total*100) : 0;
    const rows = appData.students.map((name, sIdx) => {
      const num = String(sIdx+1);
      if (!notice.collected) notice.collected = {};
      const done = !!notice.collected[num];
      return `<div class="notice-student-row">
        <span class="notice-name">${num}. ${name}</span>
        <button class="toggle-collect ${done?'done':''}" onclick="toggleCollect(${nIdx},'${num}',this)">${done?'✓ 수거':'미수거'}</button>
      </div>`;
    }).join('');
    const card = document.createElement('div');
    card.className = 'notice-card';
    card.innerHTML = `
      <div class="notice-title-row">
        <input class="notice-title-input" value="${notice.title}" placeholder="가정통신문 제목" oninput="updateNoticeTitle(${nIdx},this.value)">
        <button class="btn-remove" onclick="removeNotice(${nIdx})">×</button>
      </div>
      <div class="notice-progress">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="pb-${nIdx}" style="width:${pct}%"></div></div>
        <span class="progress-text" id="pt-${nIdx}">${collected}/${total} 수거</span>
      </div>
      <button class="expand-btn" onclick="toggleExpand(this)">▼ 학생 목록 보기</button>
      <div class="expand-content">${rows}</div>`;
    list.appendChild(card);
  });
}

function addNotice() {
  const collected = {};
  appData.students.forEach((_,idx) => { collected[String(idx+1)]=false; });
  appData.notices.push({id:Date.now(), title:'새 가정통신문', collected});
  saveData(); renderNotices();
}
function removeNotice(idx) {
  if (!confirm('이 가정통신문을 삭제할까요?')) return;
  appData.notices.splice(idx,1); saveData(); renderNotices();
}
function updateNoticeTitle(idx,val) { appData.notices[idx].title=val; saveData(); }
function toggleCollect(nIdx, num, btn) {
  const notice = appData.notices[nIdx];
  notice.collected[num] = !notice.collected[num];
  btn.classList.toggle('done', notice.collected[num]);
  btn.textContent = notice.collected[num] ? '✓ 수거' : '미수거';
  saveData();
  const total = appData.students.length;
  const collected = Object.values(notice.collected).filter(Boolean).length;
  const pct = total>0 ? Math.round(collected/total*100) : 0;
  document.getElementById('pb-'+nIdx).style.width = pct+'%';
  document.getElementById('pt-'+nIdx).textContent = `${collected}/${total} 수거`;
}
function toggleExpand(btn) {
  const content = btn.nextElementSibling;
  content.classList.toggle('open');
  btn.textContent = content.classList.contains('open') ? '▲ 접기' : '▼ 학생 목록 보기';
}

function renderMemos() {
  const list = document.getElementById('memoList');
  list.innerHTML = '';
  appData.students.forEach((name, idx) => {
    const num = String(idx+1);
    const memo = appData.memos[num]||'';
    const card = document.createElement('div');
    card.className = 'student-card';
    card.innerHTML = `
      <div class="student-num">${num}</div>
      <div class="student-name">${name}</div>
      <textarea class="memo-input" placeholder="특이사항, 상담 내용 등..." rows="2" oninput="saveMemo('${num}',this.value)">${memo}</textarea>`;
    list.appendChild(card);
  });
}
function saveMemo(num,val) { appData.memos[num]=val; saveData(); }

function renderStudentEditList() {
  const cont = document.getElementById('studentEditList');
  cont.innerHTML = '';
  appData.students.forEach((name,idx) => {
    const row = document.createElement('div');
    row.className = 'student-edit-row';
    row.innerHTML = `<span style="font-size:12px;color:var(--text-muted);width:22px;text-align:right;">${idx+1}</span>
      <input type="text" value="${name}" placeholder="이름 입력">
      <button class="btn-icon" onclick="this.parentElement.remove()">×</button>`;
    cont.appendChild(row);
  });
}
function addStudentField() {
  const cont = document.getElementById('studentEditList');
  const idx = cont.children.length+1;
  const row = document.createElement('div');
  row.className = 'student-edit-row';
  row.innerHTML = `<span style="font-size:12px;color:var(--text-muted);width:22px;text-align:right;">${idx}</span>
    <input type="text" placeholder="이름 입력">
    <button class="btn-icon" onclick="this.parentElement.remove()">×</button>`;
  cont.appendChild(row);
}
function saveStudents() {
  const inputs = document.querySelectorAll('.student-edit-row input');
  const names = Array.from(inputs).map(i=>i.value.trim()).filter(Boolean);
  if (!names.length) { alert('학생 이름을 입력해주세요.'); return; }
  appData.students = names; saveData();
  alert(`✅ ${names.length}명 저장 완료!`);
  renderStudentEditList();
}
function saveClassInfo() {
  appData.classInfo = document.getElementById('classInfo').value.trim();
  saveData(); updateHeader(); alert('저장됐어요!');
}

function exportExcel() {
  let csv = '\uFEFF';
  csv += '=== 출결 현황 ===\n날짜,번호,이름,결석,지각,조퇴\n';
  Object.keys(appData.attendance).sort().forEach(date => {
    const dayData = appData.attendance[date];
    appData.students.forEach((name,idx) => {
      const num = String(idx+1);
      const s = dayData[num]||{};
      if (s.absent||s.late||s.early)
        csv += `${date},${num},${name},${s.absent?'O':''},${s.late?'O':''},${s.early?'O':''}\n`;
    });
  });
  csv += '\n=== 출결신고서/증빙서류 ===\n날짜,번호,이름,출결유형,출결신고서,증빙서류\n';
  Object.keys(appData.attendance).sort().forEach(date => {
    const dayData = appData.attendance[date];
    appData.students.forEach((name,idx) => {
      const num = String(idx+1);
      const s = dayData[num]||{};
      const types = [];
      if (s.absent) types.push('결석');
      if (s.late)   types.push('지각');
      if (s.early)  types.push('조퇴');
      if (types.length === 0) return;
      const key = `${date}_${num}`;
      const d = appData.docs[key]||{};
      csv += `${date},${num},${name},${types.join('/')},${d.report?'제출':'미제출'},${d.proof?'제출':'미제출'}\n`;
    });
  });
  appData.notices.forEach(notice => {
    csv += `\n=== 가정통신문: ${notice.title} ===\n번호,이름,수거여부\n`;
    appData.students.forEach((name,idx) => {
      const num = String(idx+1);
      csv += `${num},${name},${notice.collected[num]?'수거':'미수거'}\n`;
    });
  });
  csv += '\n=== 메모/특이사항 ===\n번호,이름,메모\n';
  appData.students.forEach((name,idx) => {
    const num = String(idx+1);
    const memo = (appData.memos[num]||'').replace(/,/g,'·').replace(/\n/g,' ');
    if (memo) csv += `${num},${name},${memo}\n`;
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`담임관리_${todayStr()}.csv`; a.click();
  URL.revokeObjectURL(url);
}

loadData(); updateHeader();
document.getElementById('attendanceDate').value = todayStr();
renderAttendance();
</script>
