<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="시간은 결국 흘러">
  <meta name="theme-color" content="#0d0d14">
  <title>시간은 결국 흘러</title>
  <link rel="manifest" href="manifest.json">

  <!-- PWA 아이콘 (인라인 SVG → base64) -->
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d14;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
      overflow-x: hidden;
    }
    #root { min-height: 100vh; }

    @keyframes glowFade { 0%{opacity:1;transform:scale(.9)} 100%{opacity:0;transform:scale(1.3)} }
    @keyframes fadeUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-14px)} }
    @keyframes popIn { 0%{opacity:0;transform:scale(.5)} 70%{transform:scale(1.08)} 100%{opacity:1;transform:scale(1)} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes dotBounce {
      0%,80%,100%{transform:translateY(0);opacity:0.4}
      40%{transform:translateY(-8px);opacity:1}
    }
    .glow-anim { animation: glowFade 0.6s ease-out forwards; }
    .fadeup-anim { animation: fadeUp 0.5s ease-out forwards; }
    .popin-anim { animation: popIn 0.4s cubic-bezier(.4,2,.6,1) forwards; }
    .blink-anim { animation: blink 1s infinite; }
  </style>
</head>
<body>
<canvas id="fireworksCanvas" style="display:none;position:fixed;inset:0;z-index:100;pointer-events:none;"></canvas>
<div id="fireworksOverlay" style="display:none;position:fixed;inset:0;z-index:101;align-items:center;justify-content:center;pointer-events:none;"></div>
<div id="root"></div>

<script>
const TOTAL = 190;
const MONTHS = [
  { label:"3월", days:21 },{ label:"4월", days:22 },{ label:"5월", days:17 },
  { label:"6월", days:21 },{ label:"7월", days:15 },{ label:"9월", days:20 },
  { label:"10월", days:19 },{ label:"11월", days:20 },{ label:"12월", days:22 },
  { label:"1월", days:5 },
];
const MILESTONES = (() => {
  let acc = 0;
  return MONTHS.map(m => { acc += m.days; return { label: m.label, at: acc }; });
})();
const COLORS = ["#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#ff922b","#cc5de8","#f06595","#38d9a9","#fff"];

// State
let done = parseInt(localStorage.getItem('tracker_done') || '0');
let quote = null, quoteSource = null, quoteVisible = false, loadingQuote = false;
let animating = false;

function saveDone() { localStorage.setItem('tracker_done', done); }

// Fireworks
function randomBetween(a,b){ return a + Math.random()*(b-a); }
function launchFireworks() {
  const canvas = document.getElementById('fireworksCanvas');
  canvas.style.display = 'block';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const particles = [];
  const burst = (x,y) => {
    const color = COLORS[Math.floor(Math.random()*COLORS.length)];
    for(let i=0;i<80;i++){
      const angle=(Math.PI*2*i)/80+randomBetween(-0.1,0.1);
      const speed=randomBetween(2,9);
      particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
        alpha:1,radius:randomBetween(2,5),color,gravity:0.18,decay:randomBetween(0.012,0.022)});
    }
  };
  const positions = [
    [canvas.width*.25,canvas.height*.3],[canvas.width*.75,canvas.height*.25],
    [canvas.width*.5,canvas.height*.2],[canvas.width*.2,canvas.height*.5],
    [canvas.width*.8,canvas.height*.45],[canvas.width*.5,canvas.height*.4],
  ];
  let idx=0;
  const t=setInterval(()=>{ if(idx<positions.length) burst(...positions[idx++]); else clearInterval(t); },160);
  let raf;
  const animate=()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=0.98;p.alpha-=p.decay;
      if(p.alpha<=0){particles.splice(i,1);continue;}
      ctx.save();ctx.globalAlpha=p.alpha;
      ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.shadowBlur=8;ctx.shadowColor=p.color;
      ctx.fill();ctx.restore();
    }
    if(particles.length>0) raf=requestAnimationFrame(animate);
    else { canvas.style.display='none'; hideFireworkOverlay(); }
  };
  raf=requestAnimationFrame(animate);
}

function showFireworkOverlay(milestone) {
  const ov = document.getElementById('fireworksOverlay');
  ov.style.display = 'flex';
  ov.innerHTML = `<div class="popin-anim" style="text-align:center">
    <div style="font-size:64px;line-height:1">🎉</div>
    <div style="font-size:28px;font-weight:900;margin-top:12px;background:linear-gradient(135deg,#ffd93d,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
      ${milestone===0 ? '완주!' : milestone+'일 남았어요!'}
    </div>
    <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-top:6px">
      ${milestone===0 ? '모든 수업 완료 🏆' : (TOTAL-milestone)+'일째 달성!'}
    </div>
  </div>`;
  setTimeout(hideFireworkOverlay, 2800);
}
function hideFireworkOverlay() {
  document.getElementById('fireworksOverlay').style.display='none';
}

// Quote
async function fetchQuote(remaining) {
  const prompt = `한국 또는 세계 고전 문학 작품(소설, 시, 수필 등)에서 인상적인 글귀 하나를 골라줘.\n수업을 하루 마친 선생님에게 위로나 영감을 주는 내용이면 더 좋아. 남은 수업일은 ${remaining}일이야.\n반드시 JSON 형식으로만 응답해. 다른 말은 절대 하지 마.\n{"quote": "글귀 내용", "source": "작품명 - 작가"}`;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:300, messages:[{role:"user",content:prompt}] })
  });
  const data = await res.json();
  const text = data.content?.find(b=>b.type==="text")?.text||"";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

async function loadQuote(remaining) {
  loadingQuote = true; quoteVisible = false;
  renderQuote();
  try {
    const r = await fetchQuote(remaining);
    quote = r.quote; quoteSource = r.source;
  } catch {
    quote = "하루하루가 쌓여 한 해가 된다."; quoteSource = "작자 미상";
  }
  loadingQuote = false;
  setTimeout(()=>{ quoteVisible=true; renderQuote(); }, 80);
}

// Rendering
function getHue() { return Math.round(180 - (done/TOTAL)*60); }
function getRingColor() { return `hsl(${getHue()},80%,60%)`; }
function getPct() { return (done/TOTAL)*100; }
function getRemaining() { return TOTAL - done; }

function getMessage() {
  const r = getRemaining();
  if(r===0) return {text:"모든 수업 완료! 🎉",sub:"정말 수고하셨습니다"};
  if(r<=10) return {text:"거의 다 왔어요 🔥",sub:`${r}일만 더!`};
  if(r<=30) return {text:"막바지입니다 💪",sub:`${r}일 남았어요`};
  if(r<=95) return {text:"절반 넘었어요 📚",sub:`${r}일 남았어요`};
  return {text:"오늘 일은 사무실에 두고 나와",sub:`${r}일 남았어요`};
}

function renderQuote() {
  const el = document.getElementById('quoteArea');
  if(!el) return;
  const rc = getRingColor();
  if(loadingQuote) {
    el.innerHTML = `<div style="max-width:300px;width:100%;min-height:72px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px">
      <div style="display:flex;gap:6px">
        ${[0,1,2].map(i=>`<div style="width:6px;height:6px;border-radius:50%;background:${rc};animation:dotBounce 0.8s ${i*0.15}s infinite ease-in-out"></div>`).join('')}
      </div>
    </div>`;
  } else if(quote) {
    el.innerHTML = `<div style="max-width:300px;min-height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:14px;text-align:center;opacity:${quoteVisible?1:0};transform:${quoteVisible?'translateY(0)':'translateY(8px)'};transition:opacity 0.5s,transform 0.5s">
      <div style="font-size:13.5px;line-height:1.7;color:rgba(255,255,255,0.85);font-style:italic">"${quote}"</div>
      ${quoteSource?`<div style="margin-top:8px;font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1px">— ${quoteSource}</div>`:''}
    </div>`;
  } else {
    el.innerHTML = `<div style="max-width:300px;min-height:72px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);border-radius:14px;color:rgba(255,255,255,0.15);font-size:12px">버튼을 눌러보세요</div>`;
  }
}

function renderProgressBar() {
  const pct = getPct();
  const rc = getRingColor();
  const markers = MILESTONES.map((m,i)=>{
    const mp=(m.at/TOTAL)*100;
    const isReached=done>=m.at;
    const isCurrent=done<m.at&&(i===0||done>=MILESTONES[i-1].at);
    const sz=i===MILESTONES.length-1?12:8;
    return `<div style="position:absolute;left:${mp}%;top:50%;transform:translate(-50%,-50%);z-index:2;width:${sz}px;height:${sz}px;border-radius:50%;background:${isReached?rc:'rgba(255,255,255,0.15)'};border:2px solid ${isCurrent?rc:isReached?'rgba(0,0,0,0.3)':'rgba(255,255,255,0.2)'};box-shadow:${isReached?`0 0 6px ${rc}99`:'none'};transition:all 0.4s"></div>`;
  }).join('');

  const labels = MILESTONES.map((m,i)=>{
    const mp=(m.at/TOTAL)*100;
    const isReached=done>=m.at;
    const isCurrent=done<m.at&&(i===0||done>=MILESTONES[i-1].at);
    const leftStyle=mp>90?'auto':mp<10?'0':`${mp}%`;
    const rightStyle=mp>90?'0':'auto';
    const transform=mp>90?'none':mp<10?'none':'translateX(-50%)';
    return `<div style="position:absolute;left:${leftStyle};right:${rightStyle};transform:${transform};top:0;text-align:center;transition:all 0.4s">
      <div style="font-size:9px;font-weight:${isCurrent?800:isReached?600:400};color:${isCurrent?'#fff':isReached?rc:'rgba(255,255,255,0.28)'};white-space:nowrap">${m.label==='1월'?'2027 1월':m.label}</div>
      ${isCurrent?`<div class="blink-anim" style="width:3px;height:3px;border-radius:50%;background:#fff;margin:2px auto 0"></div>`:''}
    </div>`;
  }).join('');

  return `<div style="width:100%;max-width:320px;margin:0 auto">
    <div style="position:relative;height:10px;background:rgba(255,255,255,0.07);border-radius:999px;overflow:visible">
      <div style="height:100%;border-radius:999px;background:${rc};width:${pct}%;transition:width 0.5s cubic-bezier(.4,2,.6,1),background 0.5s;position:relative;z-index:1"></div>
      ${markers}
    </div>
    <div style="position:relative;height:36px;margin-top:4px">${labels}</div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.2)">
      <span>0일</span><span style="color:rgba(255,255,255,0.4);font-weight:700">${pct.toFixed(1)}%</span><span>190일</span>
    </div>
  </div>`;
}

function render() {
  const remaining = getRemaining();
  const pct = getPct();
  const rc = getRingColor();
  const msg = getMessage();
  const R = 118, cx = 140, cy = 140;
  const circ = 2*Math.PI*R;
  const offset = circ*(1-pct/100);

  document.getElementById('root').innerHTML = `
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px">

    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:11px;letter-spacing:4px;color:rgba(255,255,255,0.3);margin-bottom:6px">인생은 버티는거야!</div>
      <div style="font-size:18px;font-weight:700;color:rgba(255,255,255,0.85)">시간은 결국 흘러</div>
    </div>

    <div id="btnWrap" style="position:relative;width:280px;height:280px;cursor:${remaining>0?'pointer':'default'}">
      <svg width="280" height="280" style="position:absolute;inset:0;transform:rotate(-90deg)">
        <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
        <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${rc}" stroke-width="8"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
          style="transition:stroke-dashoffset 0.5s cubic-bezier(.4,2,.6,1),stroke 0.5s"/>
      </svg>
      <!-- base -->
      <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-42%);width:192px;height:192px;border-radius:50%;background:#555;border:4px solid #222;box-shadow:0 8px 0 #222"></div>
      <!-- dome -->
      <div id="dome" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-56%);width:174px;height:174px;border-radius:50%;background:#e8001a;border:4px solid #222;box-shadow:0 8px 0 #222,0 10px 0 #900010;transition:transform 0.08s ease,box-shadow 0.08s ease,background 0.08s">
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div id="bigNum" style="font-size:70px;font-weight:900;line-height:1;color:#fff;letter-spacing:-2px;text-shadow:0 3px 0 rgba(0,0,0,0.3);transition:transform 0.12s cubic-bezier(.4,2,.6,1)">${remaining}</div>
          <div style="font-size:13px;color:#fff;margin-top:5px;font-weight:700;letter-spacing:1px;opacity:0.85">일 남음</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.6);margin-top:3px;font-weight:600">${done>0?done+'일 완료':''}</div>
          <div id="minusOne" style="display:none;font-size:16px;color:#ffd93d;margin-top:3px;font-weight:900">−1</div>
        </div>
      </div>
      <div id="glowEl" style="display:none;position:absolute;inset:-10px;border-radius:50%;background:radial-gradient(circle,rgba(255,60,60,0.25) 0%,transparent 70%);pointer-events:none"></div>
    </div>

    <div style="text-align:center;margin-top:20px;margin-bottom:16px">
      <div style="font-size:15px;font-weight:700;color:rgba(255,255,255,0.8)">${msg.text}</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px">${msg.sub}</div>
      ${remaining>0?`<div style="font-size:10px;color:rgba(255,255,255,0.18);margin-top:3px">다음 폭죽까지 ${remaining%10===0?10:remaining%10}일 🎆</div>`:''}
    </div>

    <div id="quoteArea" style="margin-bottom:20px;width:100%;display:flex;justify-content:center"></div>

    <div style="width:100%;max-width:340px;padding:0 10px;margin-bottom:24px" id="progressBar"></div>

    <div style="display:flex;gap:12px">
      <button id="undoBtn" ${done===0?'disabled':''} style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:${done===0?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.5)'};border-radius:8px;padding:8px 18px;font-size:12px;cursor:${done===0?'not-allowed':'pointer'}">↩ 취소</button>
      <button id="resetBtn" ${done===0?'disabled':''} style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:${done===0?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.3)'};border-radius:8px;padding:8px 18px;font-size:12px;cursor:${done===0?'not-allowed':'pointer'}">초기화</button>
    </div>
  </div>`;

  document.getElementById('progressBar').innerHTML = renderProgressBar();
  renderQuote();
  bindEvents();
}

function pressAnimate() {
  const dome = document.getElementById('dome');
  const num = document.getElementById('bigNum');
  const glow = document.getElementById('glowEl');
  const minus = document.getElementById('minusOne');
  const completedEl = dome?.querySelector('div > div:nth-child(3)');

  if(dome) { dome.style.transform='translate(-50%,-50%)'; dome.style.boxShadow='0 2px 0 #222'; dome.style.background='#c0000e'; }
  if(num) { num.style.transform='scale(0.85) rotate(-5deg)'; }
  if(glow) { glow.style.display='block'; glow.className='glow-anim'; }
  if(minus) { minus.style.display='block'; minus.className='fadeup-anim'; }
  if(completedEl) completedEl.style.display='none';

  setTimeout(()=>{
    if(dome) { dome.style.transform='translate(-50%,-56%)'; dome.style.boxShadow='0 8px 0 #222,0 10px 0 #900010'; dome.style.background='#e8001a'; }
    if(num) { num.style.transform='scale(1) rotate(0deg)'; num.textContent = getRemaining(); }
    if(glow) glow.style.display='none';
    if(minus) { minus.style.display='none'; minus.className=''; }
  }, 600);
}

function bindEvents() {
  document.getElementById('btnWrap')?.addEventListener('click', handlePress);
  document.getElementById('undoBtn')?.addEventListener('click', ()=>{
    if(done>0){ done--; saveDone(); render(); }
  });
  document.getElementById('resetBtn')?.addEventListener('click', ()=>{
    done=0; quote=null; quoteVisible=false; saveDone(); render();
  });
}

function handlePress() {
  if(done>=TOTAL || animating) return;
  animating = true;
  done++;
  saveDone();
  pressAnimate();
  const remaining = getRemaining();
  // update message & progress without full re-render
  setTimeout(()=>{ animating=false; render(); }, 650);
  if(remaining%10===0){ setTimeout(()=>{ launchFireworks(); showFireworkOverlay(remaining); },300); }
  loadQuote(remaining);
}

// Init
render();
</script>
</body>
</html>
